<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Träningsschema – Halvmaraton 2026</title>
<style>
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
    --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --coral-light: #FAECE7; --coral-dark: #712B13;
    --lime-light: #EAF3DE; --lime-dark: #27500A;
    --gray-light: #F1EFE8; --gray-dark: #2C2C2A;
    --amber-light: #FAEEDA; --amber-dark: #854F0B;
    --text: #1a1a18; --text-muted: #5F5E5A; --text-faint: #888780;
    --border: rgba(0,0,0,0.1); --bg: #ffffff; --bg-surface: #F8F7F4;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #F1EFE8; --text-muted: #B4B2A9; --text-faint: #888780;
      --border: rgba(255,255,255,0.1); --bg: #1a1a18; --bg-surface: #242422;
      --green-light: #04342C; --green-dark: #9FE1CB;
      --purple-light: #26215C; --purple-dark: #CECBF6;
      --blue-light: #042C53; --blue-dark: #B5D4F4;
      --coral-light: #4A1B0C; --coral-dark: #F5C4B3;
      --lime-light: #173404; --lime-dark: #C0DD97;
      --gray-light: #2C2C2A; --amber-light: #412402; --amber-dark: #FAC775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

  .top-bar { background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .top-bar h1 { font-size: 17px; font-weight: 600; }
  .top-bar p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .zones-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; }
  .zones-scroll::-webkit-scrollbar { display: none; }
  .zone-chip { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 999px; }
  .z-z2 { background: var(--green-light); color: var(--green-dark); }
  .z-z4m { background: var(--purple-light); color: var(--purple-dark); }
  .z-z4p { background: var(--blue-light); color: var(--blue-dark); }
  .z-z5 { background: var(--coral-light); color: var(--coral-dark); }

  .progress-summary { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
  .progress-summary span { font-size: 13px; color: var(--text-muted); }
  .progress-summary strong { font-size: 14px; color: var(--green); }
  .prog-mini { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-mini-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }

  .week { border-bottom: 1px solid var(--border); }
  .week-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; background: var(--bg); user-select: none; gap: 10px; }
  .week-hdr-left { display: flex; flex-direction: column; gap: 3px; }
  .week-hdr h2 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .week-hdr p { font-size: 12px; color: var(--text-muted); }
  .week-hdr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
  .b-normal { background: var(--green-light); color: var(--green-dark); }
  .b-deload { background: var(--amber-light); color: var(--amber-dark); }
  .b-taper { background: var(--purple-light); color: var(--purple-dark); }
  .b-race { background: var(--coral-light); color: var(--coral-dark); }
  .chevron { font-size: 14px; color: var(--text-faint); transition: transform 0.2s; display: inline-block; }
  .collapsed .chevron { transform: rotate(-90deg); }

  .days-list { display: none; background: var(--bg-surface); }
  .days-list.open { display: block; }

  .day-row { display: flex; align-items: stretch; border-top: 1px solid var(--border); }
  .day-label-col { width: 44px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 12px 0 12px; gap: 2px; }
  .day-name { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; }
  .day-content { flex: 1; padding: 10px 14px 10px 0; display: flex; flex-direction: column; gap: 6px; }

  .pill { border-radius: var(--radius-sm); padding: 8px 11px; cursor: pointer; transition: opacity 0.15s; position: relative; }
  .pill:active { opacity: 0.75; }
  .pill-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; opacity: 0.75; }
  .pill-name { font-size: 13px; font-weight: 500; }
  .pill-done { opacity: 0.38; }
  .pill-done .pill-name { text-decoration: line-through; }
  .check-mark { position: absolute; top: 8px; right: 8px; font-size: 15px; opacity: 0.5; }
  .pill-optional { font-size: 10px; opacity: 0.6; font-style: italic; margin-top: 2px; }
  .pill-note-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; margin-left: 4px; vertical-align: middle; }

  .p-z2 { background: var(--green-light); color: var(--green-dark); }
  .p-interval { background: var(--purple-light); color: var(--purple-dark); }
  .p-long { background: var(--lime-light); color: var(--lime-dark); }
  .p-styrka { background: var(--blue-light); color: var(--blue-dark); }
  .p-race { background: var(--coral-light); color: var(--coral-dark); }
  .p-vila { color: var(--text-faint); font-size: 13px; font-style: italic; padding: 12px 0; }

  .week-note-bar { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 5px 16px 6px; border-top: 1px solid var(--border); cursor: pointer; }
  .week-note-bar:hover { color: var(--text); }

  .desktop-grid { display: none; }

  /* ── DESKTOP LAYOUT (≥900px) ── */
  @media (min-width: 900px) {
    #schedule { padding: 20px 32px; display: flex; flex-direction: column; gap: 14px; }
    .week { border-bottom: none; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border: 0.5px solid var(--border); }
    .week-hdr { padding: 14px 20px; border-radius: 16px 16px 0 0; }
    .week-hdr h2 { font-size: 15px; }
    .chevron { display: none; }
    .days-list { display: block !important; }
    .day-row { display: none !important; }
    .desktop-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); }
    .desktop-day { border-right: 0.5px solid var(--border); padding: 10px 10px 12px; display: flex; flex-direction: column; gap: 6px; min-height: 110px; background: var(--bg-surface); }
    .desktop-day:last-child { border-right: none; }
    .desktop-day-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .desktop-pill { border-radius: 8px; padding: 7px 9px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; position: relative; }
    .desktop-pill:hover { opacity: 0.85; transform: translateY(-1px); }
    .desktop-pill:active { opacity: 0.7; transform: translateY(0); }
    .desktop-pill-cat { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.7; margin-bottom: 2px; }
    .desktop-pill-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
    .desktop-pill-done { opacity: 0.35; }
    .desktop-pill-done .desktop-pill-name { text-decoration: line-through; }
    .desktop-check { position: absolute; top: 6px; right: 6px; font-size: 12px; opacity: 0.45; }
    .desktop-vila { font-size: 12px; color: var(--text-faint); font-style: italic; padding: 6px 0; }
    .pill-optional-label { font-size: 9px; opacity: 0.55; font-style: italic; margin-top: 1px; }
    .week-note-bar { background: var(--bg); }
  }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 0 0 env(safe-area-inset-bottom,16px); width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-body { padding: 16px 20px 24px; }
  .modal-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-faint); margin-bottom: 4px; }
  .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .modal-row { display: flex; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-lbl { font-size: 13px; color: var(--text-muted); width: 54px; flex-shrink: 0; }
  .modal-val { font-size: 14px; font-weight: 500; }
  .modal-desc { margin-top: 14px; font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .modal-close { display: block; width: 100%; margin-top: 20px; padding: 13px; background: var(--bg-surface); border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; color: var(--text); cursor: pointer; }
  .done-toggle { display: flex; gap: 10px; margin-top: 18px; }
  .done-btn { flex: 1; padding: 12px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; }
  .done-btn-check { background: var(--green); color: #fff; }
  .done-btn-uncheck { background: var(--gray-light); color: var(--text-muted); }
  .move-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .move-label { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px; }
  .day-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-pick-btn { flex: 1; min-width: 36px; padding: 8px 4px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; }
  .day-pick-btn.current { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
  .day-pick-btn:disabled { opacity: 0.3; cursor: default; }
  .note-section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .note-label { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
  .note-textarea { width: 100%; min-height: 80px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-surface); color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.5; resize: vertical; outline: none; }
  .note-textarea:focus { border-color: var(--green); }
  .note-save-btn { margin-top: 8px; padding: 8px 16px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; }
  .week-note-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .week-note-modal-overlay.open { display: flex; }
  .week-note-modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 0 0 env(safe-area-inset-bottom,16px); width: 100%; max-width: 560px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Träningsschema halvmaraton</h1>
  <p>29 jun 2026 → Helsingborg 6 sep → Malmö 3 okt <span id="sync-status" style="color:var(--green);font-weight:500;margin-left:6px"></span></p>
</div>

<div class="zones-scroll">
  <span class="zone-chip z-z2">Z2 · 140–165 bpm · 6:00–8:00/km</span>
  <span class="zone-chip z-z4m">Z4− · 178–184 bpm · 5:00–5:17/km</span>
  <span class="zone-chip z-z4p">Z4+ · 184–190 bpm · 4:40–5:00/km</span>
  <span class="zone-chip z-z5">Z5 · 190–205 bpm · 4:23–4:40/km</span>
</div>

<div class="progress-summary">
  <span>Totalt</span>
  <strong id="total-done">0 / 0</strong>
  <div class="prog-mini"><div class="prog-mini-fill" id="total-bar" style="width:0%"></div></div>
  <span id="total-pct">0%</span>
</div>

<div id="schedule"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-cat" id="m-cat"></div>
      <div class="modal-title" id="m-title"></div>
      <div id="m-rows"></div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="done-toggle" id="m-done-toggle"></div>
      <div class="move-section" id="m-move-section">
        <div class="move-label">Flytta till annan dag</div>
        <div class="day-picker" id="m-day-picker"></div>
      </div>
      <div class="note-section">
        <div class="note-label">Anteckning</div>
        <textarea class="note-textarea" id="m-note" placeholder="Känsla, avvikelse, tid, kommentar..."></textarea>
        <button class="note-save-btn" onclick="savePassNote()">Spara anteckning</button>
      </div>
      <button class="modal-close" onclick="closeModal()">Stäng</button>
    </div>
  </div>
</div>

<div class="week-note-modal-overlay" id="week-note-modal" onclick="closeWeekNoteModal(event)">
  <div class="week-note-modal">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-cat">VECKANS ANTECKNING</div>
      <div class="modal-title" id="wn-title"></div>
      <textarea class="note-textarea" id="wn-textarea" placeholder="Hur gick veckan? Avvikelser, känsla, lärdomar..."></textarea>
      <button class="note-save-btn" onclick="saveWeekNote()" style="margin-top:12px">Spara anteckning</button>
      <button class="modal-close" onclick="closeWeekNoteModal()" style="margin-top:8px">Stäng</button>
    </div>
  </div>
</div>

<script>
const DAYS=['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];

const H='HÅLLNING (post-löpning)\nCobra: 2-3 set x 2 rep, 30s on/10s off\nDjup halsflexor: 2-3 set x 4-6 rep, 10s on/10s off';
const SS='STRETCH\nFoam roller utsida lår + höft (prio 1), säte, baksida lår\nOpen books: 8 rep/sida\nKnäsitt. höftböjare: Hö 30s / Vä 45s\nStående baksida lår: Hö 30s\nSittande säte: Hö 30s\nStående höftrotation: Hö 30s / Vä 45s\nITB-stretch: Hö 30s / Vä 30s\nHuksitt. ankel: Hö 30s / Vä 30s';
const SS2='STRETCH (prio 1)\nFoam roller utsida lår + höft\nOpen books: 8 rep/sida\nKnäsitt. höftböjare: Hö 30s / Vä 45s\nStående baksida lår: Hö 30s\nSittande säte: Hö 30s';
const ST='TRÄNING\nCX Omvänd vedhuggning: 2-4 set x 6-8 rep @ 2120\n\nSS1\nPartial squat assisterad: 2-3 set x 8-12 rep @ 3120\nEnbens RDL: 2-3 set x 6-8 rep @ 3020\n\nSS2\nBOSU Multishoulder enbens: 2-3 set x 12-16 rep @ 1110\nCX Bilat. drag split stance: 2-3 set x 8-12 rep @ 2120\n\nSS3\nFramåtbollrull: 2-3 set x 6-8 rep @ 3330\nSidohöftlyft 90°: 2-3 set x 8-12 rep @ 2220';
const ST2='TRÄNING (kortversion)\nSS1\nPartial squat assisterad: 2 set x 8-12 rep @ 3120\nEnbens RDL: 2 set x 6-8 rep @ 3020\n\nSS3\nSidohöftlyft 90°: 2 set x 8-12 rep @ 2220\nFramåtbollrull: 2 set x 6-8 rep @ 3330';

const S={
  vila:{label:'Vila',cat:'',cls:'p-vila',tip:null},
  optional:{label:'Feel-good löpning',cat:'Optional',cls:'p-z2',tip:{tid:'20-30 min',puls:'140-155 bpm',fart:'6:30-8:00/km',desc:'Frivilligt pass - kör bara om kroppen och knäet känns bra. Hoppa över utan dåligt samvete.\n\n'+H}},
  z2_30:{label:'Z2 löpning',cat:'Z2 bas',cls:'p-z2',tip:{tid:'30-35 min',puls:'140-165 bpm',fart:'6:00-8:00/km',desc:'Kort och lugnt. Konversationstempo. Kan kombineras med styrka samma dag.\n\n'+H}},
  z2_40:{label:'Z2 löpning',cat:'Z2 bas',cls:'p-z2',tip:{tid:'40-50 min',puls:'140-165 bpm',fart:'6:00-8:00/km',desc:'Konversationstempo hela passet. Om du inte kan prata i hela meningar är farten för hög.\n\n'+H}},
  z2_55:{label:'Z2 löpning',cat:'Z2 bas',cls:'p-z2',tip:{tid:'55-65 min',puls:'140-165 bpm',fart:'6:00-8:00/km',desc:'Jämn aerob bas. Puls styr, inte fart. Om pulsen kryper mot 165, sänk farten direkt.\n\n'+H}},
  z2_lang:{label:'Långpass Z2',cat:'Långpass',cls:'p-long',tip:{tid:'65-75 min',puls:'140-165 bpm',fart:'6:00-8:00/km',desc:'Progressivt: första halvan nedre Z2, andra halvan mot 165. Ät/drick under passet.\n\n'+H}},
  int_z4m_kort:{label:'Intervall Z4-',cat:'Intervall',cls:'p-interval',tip:{tid:'~35 min total',puls:'178-184 bpm',fart:'5:00-5:17/km',desc:'WU 10 min Z2 → 3x6 min Z4- (90 sek aktiv vila) → CD 8 min. Målfart 5:00-5:10/km.\n\n'+H}},
  int_z4p_kort:{label:'Intervall Z4+',cat:'Intervall',cls:'p-interval',tip:{tid:'~35 min total',puls:'184-190 bpm',fart:'4:40-5:00/km',desc:'WU 10 min Z2 → 3x5 min Z4+ (90 sek aktiv vila) → CD 8 min. Tränar sub 2-fart direkt.\n\n'+H}},
  int_z5_kort:{label:'Intervall Z5',cat:'Intervall Z5',cls:'p-interval',tip:{tid:'~30 min total',puls:'190-205 bpm',fart:'4:23-4:40/km',desc:'WU 10 min Z2 → 5x2 min Z5 (90 sek jogg-vila) → CD 8 min. Hög kvalitet per drag.\n\n'+H}},
  int_z4m_lang:{label:'Intervall Z4-',cat:'Intervall',cls:'p-interval',tip:{tid:'~50 min total',puls:'178-184 bpm',fart:'5:00-5:17/km',desc:'WU 15 min Z2 → 4x7 min Z4- (2 min aktiv vila) → CD 10 min. Målfart 5:00-5:10/km.\n\n'+H}},
  int_z4p_lang:{label:'Intervall Z4+',cat:'Intervall',cls:'p-interval',tip:{tid:'~45 min total',puls:'184-190 bpm',fart:'4:40-5:00/km',desc:'WU 15 min Z2 → 4x5 min Z4+ (2 min aktiv vila) → CD 10 min. Fartpass sub 2-tempo.\n\n'+H}},
  int_z5_lang:{label:'Intervall Z5',cat:'Intervall Z5',cls:'p-interval',tip:{tid:'~45 min total',puls:'190-205 bpm',fart:'4:23-4:40/km',desc:'WU 15 min Z2 → 5x3 min Z5 (90 sek jogg-vila) → CD 10 min. Hög återhämtningstid.\n\n'+H}},
  int_taper:{label:'Aktiveringsintervall',cat:'Intervall',cls:'p-interval',tip:{tid:'~35 min total',puls:'184-190 bpm',fart:'4:40-5:00/km',desc:'WU 10 min Z2 → 4x2 min Z4+ (2 min vila) → CD 10 min. Håll benen snabba, inga prestationskrav.\n\n'+H}},
  taper_z2:{label:'Z2 taper',cat:'Z2 taper',cls:'p-z2',tip:{tid:'25-30 min',puls:'140-160 bpm',fart:'6:30-8:00/km',desc:'Lätt jogg. Håll benen igång utan att trötta ut dem. Lyssna på kroppen.\n\n'+H}},
  styrka:{label:'Styrkepass',cat:'Styrka',cls:'p-styrka',tip:{tid:'45-60 min',puls:'-',fart:'-',desc:SS+'\n\n'+ST}},
  styrka_kort:{label:'Styrkepass',cat:'Styrka',cls:'p-styrka',tip:{tid:'25-30 min',puls:'-',fart:'-',desc:SS2+'\n\n'+ST2}},
  race_hbg:{label:'Helsingborg HM',cat:'LOPP',cls:'p-race',tip:{tid:'Träningslopp',puls:'Kör på känsla',fart:'Start ~6:00/km',desc:'Träningslopp utan sub 2-krav. Starta försiktigt och öka om kroppen tillåter. Knäet styr.'}},
  race_malmo:{label:'Malmö HM',cat:'LOPP',cls:'p-race',tip:{tid:'Mål: sub 2:00:00',puls:'~178-190 bpm',fart:'~5:40/km',desc:'Mållopp sub 2:00. Starta Z4- (5:45/km) km 0-10, öka mot Z4+ km 10-18, ge allt sista 3 km.'}},
  cykel_intervall:{label:'Cykling intervall',cat:'Cykel',cls:'p-interval',tip:{tid:'~30 min',puls:'Högintensivt',fart:'-',desc:'Högintensiva cykelintervaller som ersättning för löpning. Skonsamt för knäet.'}},
  cykel_lang:{label:'Cykling långpass',cat:'Cykel',cls:'p-long',tip:{tid:'~3 h',puls:'Låg/medel',fart:'-',desc:'Långt cykelpass i låg till medelintensitet. Bra aerob träning utan belastning på knäet.'}},
  cykel_lugn:{label:'Cykling lugn',cat:'Cykel',cls:'p-z2',tip:{tid:'~50 min',puls:'Låg intensitet',fart:'-',desc:'Lugnt cykelpass i låg intensitet. Aktiv återhämtning.'}}
};

// Each day is an array of session keys. Empty array = vila.
const weeks=[
  {label:'Vecka 1',dates:'29 jun - 5 jul',tag:'normal',note:'Uppstart - knäkänningar (4 pass)',

// Cloud sync
const BIN_ID='6a43844cda38895dfe14c579';
const BIN_KEY='$2a$10$xdotTEh28eL65L9fVTDSm.UAsoWGE/hz2W6FPEzkqPUDv13WGySy2';
const BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;

let state=weeks.map(w=>w.days.map(d=>d.map(()=>false)));
let weekNotes={}, passNotes={};
let syncing=false, pendingSave=false, currentModal=null, currentWeekNote=null;

function ensureState(){
  weeks.forEach((w,wi)=>{
    if(!state[wi]) state[wi]=w.days.map(d=>d.map(()=>false));
    w.days.forEach((d,di)=>{
      if(!state[wi][di]) state[wi][di]=d.map(()=>false);
      d.forEach((_,si)=>{ if(state[wi][di][si]===undefined) state[wi][di][si]=false; });
    });
  });
}
function setSS(t){ const el=document.getElementById('sync-status'); if(el) el.textContent=t; }
async function loadCloud(){
  setSS('Synkar...');
  try{
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':BIN_KEY}});
    if(r.ok){ const d=await r.json();
      if(d.record?.state) state=d.record.state;
      if(d.record?.weekNotes) weekNotes=d.record.weekNotes;
      if(d.record?.passNotes) passNotes=d.record.passNotes;
    }
  }catch(e){}
  ensureState(); setSS(''); render();
}
async function saveCloud(){
  if(syncing){pendingSave=true;return;}
  syncing=true; setSS('Sparar...');
  try{
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':BIN_KEY},
      body:JSON.stringify({state,weekNotes,passNotes})});
    setSS('Sparat ✓'); setTimeout(()=>setSS(''),1500);
  }catch(e){ setSS('Fel'); }
  syncing=false; if(pendingSave){pendingSave=false;saveCloud();}
}
function save(){ saveCloud(); }

function badgeCls(t){ return {normal:'b-normal',deload:'b-deload',taper:'b-taper',race:'b-race'}[t]; }
function badgeLabel(t){ return {normal:'Träningsvecka',deload:'Deload',taper:'Taper',race:'Race Week'}[t]; }
function countDone(wi){ let n=0; weeks[wi].days.forEach((d,di)=>d.forEach((k,si)=>{ if(k!=='vila'&&state[wi][di][si]) n++; })); return n; }
function countTotal(wi){ let n=0; weeks[wi].days.forEach(d=>d.forEach(k=>{ if(k!=='vila') n++; })); return n; }
function updateTotals(){
  let a=0,t=0; weeks.forEach((_,wi)=>{a+=countDone(wi);t+=countTotal(wi);});
  document.getElementById('total-done').textContent=a+' / '+t;
  const p=t?Math.round(a/t*100):0;
  document.getElementById('total-bar').style.width=p+'%';
  document.getElementById('total-pct').textContent=p+'%';
}

function makePill(key,wi,di,si){
  const sess=S[key]; if(!sess) return '';
  const isDone=state[wi][di][si];
  const isRace=key==='race_hbg'||key==='race_malmo';
  const isOpt=key==='optional';
  const hasNote=passNotes[wi]&&passNotes[wi][di]&&passNotes[wi][di][si];
  return '<div class="pill '+sess.cls+(isDone?' pill-done':'')+'" onclick="openModal('+wi+','+di+','+si+')">'
    +'<div class="pill-cat">'+sess.cat+'</div>'
    +'<div class="pill-name">'+sess.label+(hasNote?'<span class="pill-note-dot"></span>':'')+'</div>'
    +(isOpt?'<div class="pill-optional">valfritt</div>':'')
    +(!isRace?'<span class="check-mark">'+(isDone?'✓':'○')+'</span>':'')
    +'</div>';
}

function render(){
  const container=document.getElementById('schedule');
  container.innerHTML='';
  weeks.forEach((week,wi)=>{
    const done=countDone(wi), tot=countTotal(wi);
    const div=document.createElement('div');
    div.className='week';

    // Header
    const hdrEl=document.createElement('div');
    hdrEl.className='week-hdr';
    hdrEl.innerHTML=
      '<div class="week-hdr-left">'
        +'<h2>'+week.label+' <span class="chevron">▾</span></h2>'
        +'<p>'+week.dates+' · '+week.note+'</p>'
      +'</div>'
      +'<div class="week-hdr-right">'
        +'<span class="badge '+badgeCls(week.tag)+'">'+badgeLabel(week.tag)+'</span>'
        +'<span style="font-size:12px;color:var(--text-faint)">'+done+'/'+tot+' avklarade</span>'
      +'</div>';
    hdrEl.addEventListener('click', (function(wi){ return function(){ toggleWeek(wi); }; })(wi));
    div.appendChild(hdrEl);

    // Week note bar
    const wnBar=document.createElement('div');
    wnBar.className='week-note-bar';
    const wn=weekNotes[wi]||'';
    wnBar.textContent=wn?('Notat: '+wn):'+ Lägg till veckanteckning';
    wnBar.addEventListener('click',(function(wi){ return function(e){ e.stopPropagation(); openWeekNoteModal(wi); }; })(wi));
    div.appendChild(wnBar);

    // Days list
    const daysList=document.createElement('div');
    daysList.className='days-list';
    daysList.id='days-'+wi;

    week.days.forEach((daySessions,di)=>{
      const row=document.createElement('div');
      row.className='day-row';
      const isEmpty=daySessions.length===0;
      if(isEmpty){
        row.innerHTML=
          '<div class="day-label-col"><span class="day-name">'+DAYS[di]+'</span></div>'
          +'<div class="day-content"><span class="p-vila">Vila</span></div>';
      } else {
        let pillsHtml='';
        daySessions.forEach((key,si)=>{ pillsHtml+=makePill(key,wi,di,si); });
        row.innerHTML=
          '<div class="day-label-col"><span class="day-name">'+DAYS[di]+'</span></div>'
          +'<div class="day-content">'+pillsHtml+'</div>';
      }
      daysList.appendChild(row);
    });

    // Desktop grid
    const dGrid=document.createElement('div');
    dGrid.className='desktop-grid';
    week.days.forEach((daySessions,di)=>{
      const isEmpty=daySessions.length===0;
      const dcell=document.createElement('div');
      dcell.className='desktop-day';
      dcell.innerHTML='<div class="desktop-day-label">'+DAYS[di]+'</div>';
      if(isEmpty){
        dcell.innerHTML+='<span class="desktop-vila">Vila</span>';
      } else {
        daySessions.forEach((key,si)=>{
          const sess=S[key]; if(!sess) return;
          const isDone=state[wi][di][si];
          const isRace=key==='race_hbg'||key==='race_malmo';
          const isOpt=key==='optional';
          const hasNote=passNotes[wi]&&passNotes[wi][di]&&passNotes[wi][di][si];
          dcell.innerHTML+='<div class="desktop-pill '+sess.cls+(isDone?' desktop-pill-done':'')+'" onclick="openModal('+wi+','+di+','+si+')">'
            +'<div class="desktop-pill-cat">'+sess.cat+'</div>'
            +'<div class="desktop-pill-name">'+sess.label+(hasNote?'<span class="pill-note-dot"></span>':'')+'</div>'
            +(isOpt?'<div class="pill-optional-label">valfritt</div>':'')
            +(!isRace?'<span class="desktop-check">'+(isDone?'✓':'○')+'</span>':'')
            +'</div>';
        });
      }
      dGrid.appendChild(dcell);
    });
    daysList.appendChild(dGrid);

    div.appendChild(daysList);
    container.appendChild(div);
  });
  updateTotals();
}

function toggleWeek(wi){
  const el=document.getElementById('days-'+wi);
  const hdr=el.previousElementSibling.previousElementSibling;
  if(el.classList.contains('open')){ el.classList.remove('open'); hdr.classList.add('collapsed'); }
  else { el.classList.add('open'); hdr.classList.remove('collapsed'); }
}
function toggleOpen(wi){
  const el=document.getElementById('days-'+wi);
  if(el) el.classList.add('open');
}

function openModal(wi,di,si){
  const key=weeks[wi].days[di][si];
  const sess=S[key]; const tip=sess.tip;
  const isDone=state[wi][di][si];
  const isRace=key==='race_hbg'||key==='race_malmo';
  document.getElementById('m-cat').textContent=sess.cat;
  document.getElementById('m-title').textContent=sess.label;
  let rows='';
  if(tip){
    if(tip.tid) rows+='<div class="modal-row"><span class="modal-lbl">Tid</span><span class="modal-val">'+tip.tid+'</span></div>';
    if(tip.puls&&tip.puls!=='-') rows+='<div class="modal-row"><span class="modal-lbl">Puls</span><span class="modal-val">'+tip.puls+'</span></div>';
    if(tip.fart&&tip.fart!=='-') rows+='<div class="modal-row"><span class="modal-lbl">Fart</span><span class="modal-val">'+tip.fart+'</span></div>';
  }
  document.getElementById('m-rows').innerHTML=rows;
  document.getElementById('m-desc').innerHTML=tip?tip.desc.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>'):'';
  const doneToggle=document.getElementById('m-done-toggle');
  if(!isRace){
    doneToggle.innerHTML=isDone
      ?'<button class="done-btn done-btn-uncheck" onclick="toggleDone('+wi+','+di+','+si+')">Markera som ej klar</button>'
      :'<button class="done-btn done-btn-check" onclick="toggleDone('+wi+','+di+','+si+')">✓ Bocka av passet</button>';
  } else { doneToggle.innerHTML=''; }
  const moveSection=document.getElementById('m-move-section');
  const picker=document.getElementById('m-day-picker');
  if(!isRace){
    moveSection.style.display='block'; picker.innerHTML='';
    DAYS.forEach((dayName,targetDi)=>{
      const hasRace=weeks[wi].days[targetDi].some(k=>k==='race_hbg'||k==='race_malmo');
      const isCurrent=targetDi===di;
      const btn=document.createElement('button');
      btn.className='day-pick-btn'+(isCurrent?' current':'');
      btn.textContent=dayName; btn.disabled=isCurrent||hasRace;
      btn.addEventListener('click',(function(wi,di,si,targetDi){ return function(){ moveSession(wi,di,si,targetDi); }; })(wi,di,si,targetDi));
      picker.appendChild(btn);
    });
  } else { moveSection.style.display='none'; }
  const existingNote=(passNotes[wi]&&passNotes[wi][di]&&passNotes[wi][di][si])||'';
  document.getElementById('m-note').value=existingNote;
  currentModal={wi,di,si};
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function moveSession(wi,fromDi,si,toDi){
  const key=weeks[wi].days[fromDi].splice(si,1)[0];
  const doneval=state[wi][fromDi].splice(si,1)[0];
  weeks[wi].days[toDi].push(key); state[wi][toDi].push(doneval);
  save(); render();
  openModal(wi,toDi,weeks[wi].days[toDi].length-1);
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow=''; currentModal=null;
}
function toggleDone(wi,di,si){
  state[wi][di][si]=!state[wi][di][si]; save(); render(); openModal(wi,di,si);
}
function savePassNote(){
  if(!currentModal) return;
  const {wi,di,si}=currentModal;
  if(!passNotes[wi]) passNotes[wi]={};
  if(!passNotes[wi][di]) passNotes[wi][di]={};
  passNotes[wi][di][si]=document.getElementById('m-note').value.trim();
  save(); render(); setSS('Anteckning sparad ✓'); setTimeout(()=>setSS(''),1500);
}
function openWeekNoteModal(wi){
  currentWeekNote=wi;
  document.getElementById('wn-title').textContent=weeks[wi].label;
  document.getElementById('wn-textarea').value=weekNotes[wi]||'';
  document.getElementById('week-note-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeWeekNoteModal(e){
  if(e&&e.target!==document.getElementById('week-note-modal')) return;
  document.getElementById('week-note-modal').classList.remove('open');
  document.body.style.overflow=''; currentWeekNote=null;
}
function saveWeekNote(){
  if(currentWeekNote===null) return;
  weekNotes[currentWeekNote]=document.getElementById('wn-textarea').value.trim();
  save(); render();
  document.getElementById('week-note-modal').classList.remove('open');
  document.body.style.overflow=''; currentWeekNote=null;
}

loadCloud();
</script>
